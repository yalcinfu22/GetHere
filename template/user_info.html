<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>User Profile - GetHere</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary-orange: #FF6B35;
            --secondary-orange: #F7931E;
            --accent-coral: #FF8C61;
            --light-peach: #FFE5DC;
            --dark-gray: #2C3E50;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, var(--light-peach) 0%, #FFF5F0 50%, var(--light-peach) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -30%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(247, 147, 30, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* PROFILE LAYOUT */

        .profile-wrapper {
            padding: 4rem 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 1000px;
            margin: 0 auto;
            overflow: hidden;
        }

        .profile-left {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.95), rgba(247, 147, 30, 0.95));
            color: #ffffff;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 3rem 2rem;
        }

        .profile-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.7);
            object-fit: cover;
            margin-bottom: 1rem;
        }

        .profile-left h5 {
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .profile-left span {
            font-size: 0.9rem;
        }

        .profile-left .back-link {
            color: #ffffff;
            font-size: 0.9rem;
            margin-top: 2rem;
            text-decoration: none;
            opacity: 0.9;
        }

        .profile-left .back-link:hover {
            opacity: 1;
        }

        /* Form side */

        .form-section {
            padding: 3rem 3rem;
        }

        .form-header {
            margin-bottom: 2rem;
        }

        .form-header h3 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-orange), var(--secondary-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--dark-gray);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .form-control:focus {
            border-color: var(--primary-orange);
            box-shadow: 0 0 0 0.2rem rgba(255, 107, 53, 0.15);
        }

        .radio-section {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }

        .radio-section h6 {
            color: var(--dark-gray);
            font-weight: 600;
            margin-bottom: 0.75rem;
        }

        .form-check-input:checked {
            background-color: var(--primary-orange);
            border-color: var(--primary-orange);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary-orange), var(--secondary-orange));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.75rem 2.2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4);
        }

        .btn-delete {
            border-radius: 12px;
            padding: 0.75rem 2rem;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .form-section {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="profile-wrapper">
    <div class="container">
        <div class="profile-card">
            <div class="row g-0">
                <!-- LEFT: avatar + basic info -->
                <div class="col-md-4">
                    <div class="profile-left">
                        <!-- Replace src with user avatar if available -->
                        <img
                            src="https://st3.depositphotos.com/15648834/17930/v/600/depositphotos_179308454-stock-illustration-unknown-person-silhouette-glasses-profile.jpg"
                            alt="User avatar"
                            class="profile-avatar"
                        >
                        <h5>GetHere User</h5>
                        <span>user@example.com</span>

                        <a href="/" class="back-link">
                            <i class="bi bi-arrow-left-circle"></i> Back to Home
                        </a>
                    </div>
                </div>

                <!-- RIGHT: profile form (only your existing fields) -->
                <div class="col-md-8">
                    <div class="form-section">
                        <div class="form-header">
                            <h3>My Profile</h3>
                            <p>Update your account information for GetHere</p>
                        </div>

                        <!-- FORM: adjust action to your update route -->
                        <form action="{{ url_for('user.update_user', user_id = user.user_id) }}" method="POST">
                            <!-- First / Last name -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label" for="first_name">First Name</label>
                                    <input type="text" id="first_name" name="first_name"
                                           class="form-control"
                                           placeholder="e.g., Amr" value="{{ user.name.split()[0] }}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="last_name">Last Name</label>
                                    <input type="text" id="last_name" name="last_name"
                                           class="form-control"
                                           placeholder="e.g., Taweel"
                                           value="{{ user.name.split()[1:] | join(' ') }}" required>
                                </div>
                            </div>

                            <!-- Occupation & Age -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label" for="occupation">Occupation (Optional)</label>
                                    <input type="text" id="occupation" name="occupation"
                                           class="form-control" placeholder="e.g., Student" value="{{ user.Occupation or '' }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="age">Age (Optional)</label>
                                    <input type="number" id="age" name="age"
                                           class="form-control" placeholder="e.g., 20" value="{{ user.Age or '' }}">
                                </div>
                            </div>

                            <!-- Password & City -->
                            <div class="row g-3 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label" for="password">Password</label>
                                    <input type="password" id="password" name="password"
                                           class="form-control"
                                           placeholder="Leave it empty if you do not want to change it" maxlength="17">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label" for="city">City</label>
                                    <input type="text" id="city" name="city"
                                           class="form-control" placeholder="e.g., Istanbul" value ="{{user.city}}"required>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="mb-3">
                                <label class="form-label" for="email">Email</label>
                                <input type="email" id="email" name="email"
                                       class="form-control" placeholder="e.g., amr@gmail.com" value = "{{user.email}}"required>
                            </div>

                            <!-- Address -->
                            <div class="mb-3">
                                <label class="form-label" for="address">Address</label>
                                <input type="text" id="address" name="address"
                                       class="form-control"
                                       placeholder="e.g., Kagithane, Tasci Caddesi, Bina 1 (optional)" value="{{user.address or ''}}">
                            </div>

                            <!-- Gender -->
                            <div class="radio-section">
                                <h6>Gender</h6>
                                <div class="d-flex flex-wrap gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender"
                                               id="female" value="Female"  {% if user.Gender == 'Female' %}checked{% endif %} required>
                                        <label class="form-check-label" for="female">Female</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender"
                                               id="male" value="Male" {% if user.Gender == 'Male' %}checked{% endif %}>
                                        <label class="form-check-label" for="male">Male</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="gender"
                                               id="other" value="Prefer not to say" {% if user.Gender == 'Prefer not to say' %}checked{% endif %}>
                                        <label class="form-check-label" for="other">Prefer not to say</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Marital Status (same name as in signup: martial_status) -->
                            <div class="radio-section">
                                <h6>Marital Status</h6>
                                <div class="d-flex flex-wrap gap-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="martial_status"
                                               id="married" value="Married" {% if user.Marital_Status == 'Married' %}checked{% endif %} required>
                                        <label class="form-check-label" for="married">Married</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="martial_status"
                                               id="single" value="Single" {% if user.Marital_Status == 'Single' %}checked{% endif %}>
                                        <label class="form-check-label" for="single">Single</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="martial_status"
                                               id="marital_other" value="Prefer not to say" {% if user.Marital_Status == 'Prefer not to say' %}checked{% endif %}>
                                        <label class="form-check-label" for="marital_other">Prefer not to say</label>
                                    </div>
                                </div>
                            </div>

                            <!-- Salary -->
                                    <div class="radio-section">
                    <h6>Salary Range</h6>
                    <div class="d-flex flex-wrap gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="salary"
                                id="high_salary" value=">5000$"
                                {% if user.Monthly_Income == '>5000$' %}checked{% endif %}
                                required>
                            <label class="form-check-label" for="high_salary">&gt; $5,000</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="salary"
                                id="low_salary" value="<5000$"
                                {% if user.Monthly_Income == '<5000$' %}checked{% endif %}>
                            <label class="form-check-label" for="low_salary">&lt; $5,000</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="salary"
                                id="salary_other" value="Prefer not to say"
                                {% if user.Monthly_Income == 'Prefer not to say' %}checked{% endif %}>
                            <label class="form-check-label" for="salary_other">Prefer not to say</label>
                    </div>
                </div>
            </div>

                            <!-- Buttons: Save + Delete -->
                            <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mt-4">
                                <button type="submit" class="btn btn-save">
                                    <i class="bi bi-save me-1"></i> Save Profile
                                </button>

                                <!-- Delete account: adjust action URL in your backend -->
                                <button
                                    type="submit"
                                    class="btn btn-outline-danger btn-delete"
                                    formaction="{{ url_for('user.delete', user_id = user.user_id) }}"
                                    formmethod="POST"
                                    onclick="return confirm('Are you sure you want to delete your account? This action cannot be undone.');"
                                >
                                    <i class="bi bi-trash me-1"></i> Delete Account
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

            </div> <!-- row -->
        </div> <!-- profile-card -->
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
