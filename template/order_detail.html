<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Details</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --primary: #ff6b35;
        --secondary: #f7931e;
        --bg: #f6f7f9;
        --card: #ffffff;
        --text: #222;
        --muted: #6c757d;
        --border: #eef0f3;
        --shadow: 0 8px 22px rgba(0, 0, 0, 0.07);
        --radius: 16px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial,
          sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 900px;
        margin: 40px auto;
        padding: 0 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 32px;
        font-weight: 900;
      }

      .subtitle {
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 20px;
      }

      .card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
        margin-bottom: 18px;
      }

      .label {
        color: var(--muted);
        font-weight: 700;
        font-size: 13px;
      }

      .value {
        font-weight: 900;
        font-size: 15px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        padding: 6px 12px;
        border-radius: 999px;
        font-weight: 900;
        font-size: 12px;
        background: #f4f5f7;
      }

      .veg {
        color: #2f9e44;
      }
      .nonveg {
        color: #c92a2a;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }

      th,
      td {
        padding: 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
      }

      th {
        font-size: 13px;
        color: var(--muted);
      }

      .qty-input {
        width: 70px;
        padding: 6px;
        border-radius: 8px;
        border: 1px solid var(--border);
        font-weight: 650;
      }

      .total {
        text-align: right;
        font-size: 18px;
        font-weight: 900;
        margin-top: 12px;
      }

      .stars {
        display: flex;
        gap: 6px;
        font-size: 22px;
        cursor: pointer;
        user-select: none;
      }

      .star {
        color: #dee2e6;
        transition: color 0.15s ease, transform 0.1s ease;
      }

      .star:hover {
        transform: scale(1.15);
      }

      .star.active {
        color: #f5c518;
      }

      .btn {
        margin-top: 14px;
        padding: 10px 16px;
        border-radius: 999px;
        border: none;
        font-weight: 900;
        color: #fff;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        cursor: pointer;
      }

      .btn-delete {
        background: linear-gradient(135deg, #d00000, #9d0208);
      }

      .btn-submit {
        width: 200px;
      }

      .btn-delete:hover {
        background: linear-gradient(135deg, #fa5252, #e03131);
      }

      .btn-outline {
        border: 1px solid rgba(255, 107, 53, 0.25);
        background: #fff;
        color: var(--primary);
        padding: 10px 14px;
        border-radius: 999px;
        font-weight: 850;
        cursor: pointer;
        transition: 0.15s ease;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
      }

      .btn-outline:hover {
        background: #fff5f2;
        border-color: var(--primary);
        transform: translateY(-1px);
      }

      .stars .star {
        color: #dee2e6;
      }

      .stars .star.active {
        color: #f5c518;
      }
    </style>
  </head>

  <body>
    <div id="wrap" class="wrap"></div>

    <script>
      const rId = JSON.parse("{{ r_id | tojson }}");
      const oId = JSON.parse("{{ o_id | tojson }}");

      const backUrl =
        "{{ url_for('restaurant.restaurant_orders', r_id=r_id) }}";

      const wrap = document.getElementById("wrap");

      async function loadOrders() {
        let url = `/orders/view?o_id=${oId}`;

        try {
          const res = await fetch(url);
          let data = await res.json();

          const order = data;

          const k = `<h1>Order Details</h1>
                        <p class="subtitle">Order #${order.o_id}</p>

                        <!-- Restaurant & Courier -->
                        <div class="card">
                            <div class="d-flex justify-content-between align-items-center w-100">
                            <div>
                                <div class="label">Restaurant</div>
                                <div class="value">${
                                  order.restaurant_name
                                }</div>
                            </div>

                            <div>
                                <div class="label">Courier</div>
                                <div class="value">${order.courier_name} ${
            order.courier_surname
          }</div>
                            </div>

                            <div>
                                <span class="pill"> ${
                                  order.IsDelivered
                                    ? "✅ Delivered"
                                    : "⏳ In progress"
                                }</span>
                            </div>
                            </div>
                        </div>

                        <!-- Items -->
                        <div class="card">
                            <table>
                            <thead>
                                <tr>
                                <th>Food</th>
                                <th>Type</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                <td><strong>${order.food_name}</strong></td>
                                <td>
                                    <span class="veg"> ${
                                      order.veg ? "🥬 Veg" : "🍗 Non-Veg"
                                    }</span>
                                </td>
                                <td>${order.currency} ${order.price}</td>
                                <td>
                                    ${order.sales_qty}
                                </td>
                                </tr>
                            </tbody>
                            </table>

                            <div id="totalPrice" class="total">Total: ${
                              order.currency
                            } ${order.sales_amount}</div>
                        </div>

                        <a
                            href="${backUrl}"
                            class="btn btn-outline"
                            >← Back to Orders</a
                        >`;
          wrap.innerHTML = k;
        } catch (err) {
          console.error("Error loading order:", err);
          document.getElementById("order-list").innerHTML =
            '<div class="col-12 text-center text-danger">Failed to load orders.</div>';
        }
      }

      loadOrders();
    </script>
  </body>
</html>
